name: Build & release Chrome extension

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version
        id: version
        shell: bash
        run: |
          V=$(jq -r .version manifest.json)
          echo "v=$V" >> $GITHUB_OUTPUT
          echo "Version: $V"

      - name: Check tag does not exist
        id: tagcheck
        shell: bash
        run: |
          V="${{ steps.version.outputs.v }}"
          if [ -z "$V" ] || [ "$V" = "null" ]; then
            echo "No version extracted, aborting"
            exit 1
          fi
          if git ls-remote --tags origin "v${V}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${V} bestaat al, skip release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install crx3 tool
        if: steps.tagcheck.outputs.exists == 'false'
        run: npm install -g crx3

      - name: Write signing key
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          printf '%s' "${{ secrets.EXTENSION_PRIVATE_KEY }}" > /tmp/extension.pem
          chmod 600 /tmp/extension.pem
          head -1 /tmp/extension.pem

      - name: Pack CRX + ZIP
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          mkdir /tmp/ext-stage
          rsync -a --exclude '.git*' --exclude 'README.md' --exclude '.github' ./ /tmp/ext-stage/
          crx3 /tmp/ext-stage \
            --keyPath /tmp/extension.pem \
            --crxPath verkoopklaar-coach.crx
          (cd /tmp/ext-stage && zip -r "$GITHUB_WORKSPACE/verkoopklaar-coach.zip" . )
          ls -la verkoopklaar-coach.*

      - name: Generate updates.xml
        if: steps.tagcheck.outputs.exists == 'false'
        shell: bash
        run: |
          V="${{ steps.version.outputs.v }}"
          CRX_URL="https://github.com/verkoopjezaak/verkoopklaar-coach-extension/releases/download/v${V}/verkoopklaar-coach.crx"
          cat > updates.xml <<XML
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='bjddniblpapfpeoglbmjliogmcdgfkkh'>
              <updatecheck codebase='${CRX_URL}' version='${V}' />
            </app>
          </gupdate>
          XML
          cat updates.xml

      - name: Create release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.v }}
          name: v${{ steps.version.outputs.v }}
          body: |
            Auto-generated release voor Verkoopklaar Coach v${{ steps.version.outputs.v }}.

            Chrome update_url in manifest wijst naar deze release. Binnen een paar uur detecteert Chrome automatisch, of klik handmatig "Update extensions" in chrome://extensions/.
          files: |
            verkoopklaar-coach.crx
            verkoopklaar-coach.zip
            updates.xml
