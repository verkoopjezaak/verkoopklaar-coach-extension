<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verkoopklaar Coach</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 16px;
      min-width: 280px;
      background: #f2f4fb;
      color: #0b334c;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #0b334c;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }
    .status-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
      color: #374151;
    }
    .status-row .check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .status-row .check.ok { background: #d1fae5; color: #065f46; }
    .status-row .check.pending { background: #fef3c7; color: #92400e; }
    .status-row .check.missing { background: #e5e7eb; color: #9ca3af; }
    .status-row .check.error { background: #fee2e2; color: #991b1b; }
    #current-state {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f3f4f6;
      font-size: 12px;
      color: #6b7280;
    }
    #current-state.active { color: #dc2626; font-weight: 600; }
    #current-state.error { color: #dc2626; font-weight: 600; }
    #hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.4;
    }
    .btn {
      display: none;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    #start-btn {
      background: #3e8684;
      color: white;
    }
    #start-btn:hover:not(:disabled) { background: #2f6d6b; }
    #start-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    #mic-btn {
      background: #0b334c;
      color: white;
    }
    #mic-btn:hover { background: #082736; }
    #stop-btn {
      background: #dc2626;
      color: white;
    }
    #stop-btn:hover { background: #b91c1c; }
    #reset-btn {
      background: transparent;
      color: #6b7280;
      border: 1px solid #e5e7eb;
    }
    #reset-btn:hover { background: #f9fafb; color: #374151; }
    #version {
      font-size: 10px;
      color: #9ca3af;
      text-align: right;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>
    <span>Verkoopklaar Coach</span>
  </h1>
  <div class="status-card">
    <div class="status-label">Vereisten</div>
    <div class="status-row" id="row-tab">
      <span class="check missing" id="check-tab">·</span>
      <span id="text-tab">Open een meeting-pagina</span>
    </div>
    <div class="status-row" id="row-context">
      <span class="check missing" id="check-context">·</span>
      <span id="text-context">Meeting-context laden</span>
    </div>
    <div class="status-row" id="row-mic">
      <span class="check missing" id="check-mic">·</span>
      <span id="text-mic">Microfoon autoriseren</span>
    </div>
    <div id="current-state">Niet actief</div>
    <div id="hint"></div>
  </div>
  <button id="mic-btn" class="btn">Microfoon autoriseren</button>
  <button id="start-btn" class="btn">Coach starten</button>
  <button id="stop-btn" class="btn">Coach stoppen</button>
  <button id="reset-btn" class="btn">Reset (opnieuw beginnen)</button>
  <div id="version"></div>
  <script src="popup.js"></script>
</body>
</html>
