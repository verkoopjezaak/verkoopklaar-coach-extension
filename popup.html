<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verkoopklaar Coach</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 16px;
      min-width: 240px;
      background: #f2f4fb;
      color: #0b334c;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #0b334c;
    }
    #status-box {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }
    #status-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    #status-text {
      font-size: 13px;
      font-weight: 600;
    }
    #status-text.idle { color: #6b7280; }
    #status-text.active { color: #3e8684; }
    #status-text.error { color: #dc2626; }
    #stop-btn {
      display: none;
      width: 100%;
      padding: 8px 12px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #stop-btn:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <h1>Verkoopklaar Coach</h1>
  <div id="status-box">
    <div id="status-label">Status</div>
    <div id="status-text" class="idle">Geen actieve sessie</div>
  </div>
  <button id="stop-btn">Stop sessie</button>
  <script src="popup.js"></script>
</body>
</html>
