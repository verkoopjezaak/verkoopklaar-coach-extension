<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verkoopklaar Coach</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 16px;
      min-width: 260px;
      background: #f2f4fb;
      color: #0b334c;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #0b334c;
    }
    #status-box {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e5e7eb;
    }
    #status-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    #status-text {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-text .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    #status-text.default { color: #6b7280; }
    #status-text.default .dot { background: #9ca3af; }
    #status-text.ready { color: #16a34a; }
    #status-text.ready .dot { background: #16a34a; }
    #status-text.active { color: #dc2626; }
    #status-text.active .dot { background: #dc2626; animation: pulse 1.2s ease-in-out infinite; }
    #status-text.error { color: #dc2626; }
    #status-text.error .dot { background: #dc2626; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
    .btn {
      display: none;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    #start-btn {
      background: #3e8684;
      color: white;
    }
    #start-btn:hover { background: #2f6d6b; }
    #start-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    #stop-btn {
      background: #dc2626;
      color: white;
    }
    #stop-btn:hover { background: #b91c1c; }
    #version {
      font-size: 10px;
      color: #9ca3af;
      text-align: right;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Verkoopklaar Coach</h1>
  <div id="status-box">
    <div id="status-label">Status</div>
    <div id="status-text" class="default">
      <span class="dot"></span>
      <span id="status-label-text">Laden...</span>
    </div>
    <div id="hint"></div>
  </div>
  <button id="start-btn" class="btn">Coach starten</button>
  <button id="stop-btn" class="btn">Coach stoppen</button>
  <div id="version"></div>
  <script src="popup.js"></script>
</body>
</html>
