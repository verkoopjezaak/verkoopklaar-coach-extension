<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Verkoopklaar Coach — microfoon autoriseren</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 40px;
      min-height: 100vh;
      background: #f2f4fb;
      color: #0b334c;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    p {
      font-size: 14px;
      color: #4b5563;
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .status {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
    }
    .status.pending { background: #fef3c7; color: #92400e; }
    .status.ok { background: #d1fae5; color: #065f46; }
    .status.error { background: #fee2e2; color: #991b1b; }
    button {
      background: #3e8684;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    button:hover { background: #2f6d6b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Microfoon autoriseren</h1>
    <p>De Verkoopklaar Coach moet eenmalig toegang krijgen tot je microfoon om je stem tijdens gesprekken te transcriberen. Chrome toont zo een toestemmingsdialoog.</p>
    <div id="status" class="status pending">Even geduld...</div>
    <button id="retry-btn" style="display: none;">Opnieuw proberen</button>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
